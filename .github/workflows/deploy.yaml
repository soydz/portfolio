name: Build & Deploy Portfolio

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # ← Permiso para subir a GHCR
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y subir imagen
        run: |
          # Convertir a minúsculas (GHCR requiere lowercase)
          echo "GHCR_REPO=ghcr.io/${{ github.repository_owner }}/portfolio:latest" >> $GITHUB_ENV
          docker build -t ghcr.io/${{ github.repository_owner }}/portfolio:latest .
          docker push ghcr.io/${{ github.repository_owner }}/portfolio:latest